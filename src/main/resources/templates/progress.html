<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HabitTracker</title>
    <link rel="stylesheet" href="/css/output.css">
</head>
<body class="bg-linear-to-b from-lightViolet to-white flex flex-col min-h-screen dark:from-[#0d0d0d] dark:to-[#0d0d0d] dark:text-gray-200">
<header class="bg-white dark:bg-[#1a1a1a] shadow-sm dark:shadow-black/40">
    <nav class="flex items-center justify-center relative px-8 py-4">

        <!-- Left: Logo -->
        <div class="absolute left-8 flex items-center space-x-2">
            <span class="text-xl font-semibold text-gray-800 dark:text-gray-100">HabitTracker</span>
        </div>

        <!-- Center: Nav Links -->
        <div class="bg-magnolia dark:bg-[#222] rounded-3xl flex items-center px-5 py-1">
            <ul class="hidden md:flex space-x-7 text-cadetGray dark:text-gray-400 font-normal items-center">

                <li >
                    <a href="/dashboard" class="hover:text-amethyst dark:hover:text-violet-400 transition-colors duration-200"  >Dashboard</a>
                </li>

                <li >
                    <a href="/dashboard/my-habits"
                       class="hover:text-amethyst dark:hover:text-violet-400 transition-colors duration-200">
                        My Habits
                    </a>
                </li>

                <li class="bg-violet-500 rounded-3xl py-2 px-4 flex items-center justify-center">
                    <a href="/dashboard/progress"
                       class="text-white font-medium" >
                        Progress
                    </a>
                </li>
            </ul>
        </div>

        <!-- Right: Profile menu -->
        <div class="absolute right-8 flex items-center space-x-4">
            <button id="profileButton" class="flex items-center space-x-2 cursor-pointer">
                <img th:src="${user.profileImage != null ? user.profileImage : '/images/default-profile.jpg'}"
                     class="w-14 h-14 rounded-full border border-gray-300 dark:border-gray-600 object-cover"
                     alt="User Photo"/>
            </button>

            <div id="profileMenu"
                 class="hidden absolute right-2 top-12 w-44 bg-white dark:bg-[#1f1f1f]
                        border border-gray-200 dark:border-gray-700 rounded-xl
                        shadow-lg dark:shadow-black/40 z-20 transition duration-200">

                <a href="/profile"
                   class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-200
                          hover:bg-violet-50 dark:hover:bg-[#333] hover:text-amethyst dark:hover:text-violet-300">
                    Profile
                </a>

                <a href="/settings"
                   class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-200
                          hover:bg-violet-50 dark:hover:bg-[#333] hover:text-amethyst dark:hover:text-violet-300">
                    Settings
                </a>

                <a href="#" class="logOutBtn block px-4 py-2 text-sm text-gray-700 dark:text-gray-200
                                  hover:bg-violet-50 dark:hover:bg-[#333] hover:text-red-600">
                    Log out
                </a>
            </div>
        </div>
    </nav>
</header>


<main class="dark:bg-[#161616] dark:border-gray-700 dark:shadow-black/40 bg-white rounded-4xl my-6 mx-4 border border-gray-100 shadow-md flex flex-col overflow-y-auto h-[87vh]">

        <!--Progress-->
        <section class="px-9 mb-7 mt-10">
            <span class="text-2xl font-medium dark:text-white">Progress</span>
        </section>
  

        <section class="flex flex-wrap justify-center gap-6 my-6 mx-7">
            <!--Total Habits-->
            <div class="flex items-center  border border-gray-200 dark:border-gray-700 shadow-sm rounded-full py-4 px-5 w-[450px] bg-violet-500 dark:bg-[#5B3081]">
                <!--icon-->
                <div class="bg-white border border-gray-100 w-12 h-12 rounded-full mx-4 flex items-center justify-center">
                    <svg class="text-violet-700 " xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="m5.814 16.502l3.896-3.896q.146-.146.353-.153q.208-.007.354.159q.14.153.14.357t-.14.35l-4.013 4.02q-.243.242-.566.242t-.565-.243L3.335 15.4q-.14-.14-.131-.344t.15-.344t.347-.14t.341.14zm0-7.23L9.71 5.374q.146-.146.353-.153q.208-.007.354.159q.14.153.14.357t-.14.35l-4.013 4.02q-.243.242-.566.242t-.565-.242L3.334 8.169q-.14-.14-.13-.344t.15-.344t.347-.14t.341.14zm7.705 6.844q-.212 0-.356-.144t-.144-.357t.144-.356t.356-.143h7q.213 0 .357.143q.143.144.143.357t-.143.356t-.357.144zm0-7.231q-.212 0-.356-.144t-.144-.357t.144-.356t.356-.144h7q.213 0 .357.144t.143.357t-.143.356t-.357.143z" stroke-width="1" stroke="currentColor"/>
                    </svg>
                </div>
                <!--description-->
                <div class="flex flex-col flex-1 justify-center space-y-2">
                    <span class=" font-light text-white">Total Habits</span>
                    <span class=" font-semibold text-xl text-white" th:text="${totalHabits}">0</span>
                </div>
            </div>
            <!--Active Streaks-->
            <div class="flex items-center  border border-gray-200 dark:border-gray-700 shadow-sm rounded-full py-4 px-5 w-[450px] bg-green-500 dark:bg-[#327B2D] transition">
                <!--icon-->
                <div class="bg-white border border-gray-100 w-12 h-12 rounded-full mx-4 flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.9" stroke="currentColor" class=" text-green-700 size-6 ">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.362 5.214A8.252 8.252 0 0 1 12 21 8.25 8.25 0 0 1 6.038 7.047 8.287 8.287 0 0 0 9 9.601a8.983 8.983 0 0 1 3.361-6.867 8.21 8.21 0 0 0 3 2.48Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 18a3.75 3.75 0 0 0 .495-7.468 5.99 5.99 0 0 0-1.925 3.547 5.975 5.975 0 0 1-2.133-1.001A3.75 3.75 0 0 0 12 18Z" />
                    </svg>

                </div>
                <!--description-->
                <div class="flex flex-col flex-1 justify-center space-y-2">
                    <span class=" font-light text-white">Active Streaks</span>
                    <span class=" font-semibold text-xl text-white">
                        <span th:text="${currentStreak}"></span>
                        <span th:text="${currentStreak == 1 ? 'day' : 'days'}"></span>
                    </span>
                </div>
            </div>
            <!--Best Streak-->
            <div class="flex items-center  border border-gray-200  dark:border-gray-700 shadow-sm rounded-full py-4 px-5 w-[450px] bg-red-500 dark:bg-[#7B2D2D] ">
                <!--icon-->
                <div class="bg-white border border-gray-100 w-12 h-12 rounded-full mx-4 flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="text-red-700 size-6 ">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 18.75h-9m9 0a3 3 0 0 1 3 3h-15a3 3 0 0 1 3-3m9 0v-3.375c0-.621-.503-1.125-1.125-1.125h-.871M7.5 18.75v-3.375c0-.621.504-1.125 1.125-1.125h.872m5.007 0H9.497m5.007 0a7.454 7.454 0 0 1-.982-3.172M9.497 14.25a7.454 7.454 0 0 0 .981-3.172M5.25 4.236c-.982.143-1.954.317-2.916.52A6.003 6.003 0 0 0 7.73 9.728M5.25 4.236V4.5c0 2.108.966 3.99 2.48 5.228M5.25 4.236V2.721C7.456 2.41 9.71 2.25 12 2.25c2.291 0 4.545.16 6.75.47v1.516M7.73 9.728a6.726 6.726 0 0 0 2.748 1.35m8.272-6.842V4.5c0 2.108-.966 3.99-2.48 5.228m2.48-5.492a46.32 46.32 0 0 1 2.916.52 6.003 6.003 0 0 1-5.395 4.972m0 0a6.726 6.726 0 0 1-2.749 1.35m0 0a6.772 6.772 0 0 1-3.044 0" />
                    </svg>
                </div>
                <!--description-->
                <div class="flex flex-col flex-1 justify-center space-y-2">
                    <span class=" font-light text-white">Best Streak</span>
                    <span class=" font-semibold text-xl text-white">
                        <span  th:text="${maxStreak}"></span>
                        <span th:text="${maxStreak == 1 ? 'day' : 'days'}"></span>
                    </span>
                </div>
            </div>
        </section>

        <!-- Monthly Progress -->
        <section class="bg-lightViolet dark:bg-[#1e1e2e] rounded-[40px] p-6 mx-6 mt-8 mb-8 shadow-sm border border-gray-100">
            <!-- Header row -->
            <div class="flex justify-between items-center mb-4">
                <span class="text-gray-800 font-semibold text-lg dark:text-white">Monthly Progress</span>
                <div class="flex items-center space-x-4 text-sm text-cadetGray dark:text-gray-200">
                    <div class="flex items-center space-x-1">
                        <span class="w-3 h-3 rounded-full bg-violet-500"></span>
                        <span >Completed</span>
                    </div>
                </div>
            </div>

            <!-- Chart placeholder -->
            <!-- Progress visualization -->
            <div class="w-full h-[220px] bg-[#ffffff] dark:bg-gray-600 border-2 border-dashed border-gray-200 rounded-[30px]
                flex items-center justify-center overflow-x-auto p-6">

                <div class="flex space-x-2">
                    <div th:each="entry, iter : ${monthlyProgress}" class="flex flex-col items-center">
                        <!-- Кружечок -->
                        <div th:classappend="${entry.value} ? 'bg-violet-500' : 'bg-gray-200'"
                             class="w-4 h-4 rounded-full mb-1 transition-all duration-300"></div>
                        <!-- Номер дня -->
                        <span class="text-[10px] text-gray-400 dark:text-gray-100" th:text="${iter.index + 1}"></span>
                    </div>
                </div>
            </div>
        </section>

        <!--Category Progress-->
        <section class="mt-2 mx-7">
            <div class="flex justify-between items-center mb-4">
                <span class="text-xl font-semibold text-gray-800 dark:text-white">Category Progress</span>
            </div>
        </section>

        <!--Statistics for Category-->
        <section id="category-progress"
                 th:attr="data-categories=${categoryProgress}"
         class="grid grid-cols-4 gap-y-6 gap-x-4 mx-7 mb-7 justify-items-center">
        </section>

        <!--Tip-->
        <section class=" flex space-x-2 border border-gray-200 rounded-full px-4 py-4 mx-5 mb-10">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6 text-cadetGray" >
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 0 0-2.456 2.456ZM16.894 20.567 16.5 21.75l-.394-1.183a2.25 2.25 0 0 0-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 0 0 1.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 0 0 1.423 1.423l1.183.394-1.183.394a2.25 2.25 0 0 0-1.423 1.423Z" />
                </svg>
                <span class="text-cadetGray font-normal">Small steps lead to big changes.</span>
        </section>
        
</main>

<!-- Logout Modal -->
<div id="logOutModal"
     class="hidden fixed inset-0 bg-black/30 dark:bg-black/60 items-center justify-center z-50">

    <div class="bg-white dark:bg-[#1c1c1c] rounded-3xl w-[500px] p-6 shadow-2xl dark:shadow-black/40 relative">

        <button id="closeLogOutModal"
                class="absolute top-4 right-4 text-gray-400 dark:text-gray-300 hover:text-gray-600">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none"
                 viewBox="0 0 24 24" stroke-width="1.5"
                 stroke="currentColor" class="size-6">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M6 18 18 6M6 6l12 12"/>
            </svg>
        </button>

        <div class="flex justify-center items-center mb-3">
            <div class="bg-magnolia dark:bg-[#2d2d2d] rounded-full p-3">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none"
                     viewBox="0 0 24 24"
                     stroke-width="1.5" stroke="currentColor"
                     class="w-6 h-6 text-violet-500">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6A2.25 2.25 0 0 0 5.25 5.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"/>
                </svg>
            </div>
        </div>

        <div class="flex justify-center items-center">
            <span class="text-lg font-semibold text-gray-900 dark:text-gray-200">Log Out</span>
        </div>

        <div class="flex justify-center items-center mt-1">
                <span class="text-sm text-cadetGray dark:text-gray-400">
                    Are you sure you want to log out of your account?
                </span>
        </div>

        <div class="flex justify-end space-x-3 pt-3 mt-4">
            <button type="button" id="cancelLogOutModal"
                    class="px-4 py-2 bg-gray-100 dark:bg-gray-700
                               hover:bg-gray-200 dark:hover:bg-gray-600 rounded-full">
                Cancel
            </button>
            <button type="submit" id="logOutConfirmBtn"
                    class="px-4 py-2 bg-red-500 text-white rounded-full hover:bg-red-700">
                Log out
            </button>
        </div>

    </div>
</div>

<script src="/js/theme.js"></script>
  <script src="/js/progress.js"></script>

</body>
</html>
