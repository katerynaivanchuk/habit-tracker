<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HabitTracker</title>
    <link rel="stylesheet" href="/css/output.css">
</head>
<body class="bg-linear-to-b from-lightViolet to-white flex flex-col min-h-screen dark:from-[#0d0d0d] dark:to-[#0d0d0d] dark:text-gray-200">
    <header class="bg-white dark:bg-[#1a1a1a] shadow-sm dark:shadow-black/40">
        <nav class="flex items-center justify-center relative px-8 py-4">
            <!-- Left: Logo -->
            <div class="absolute left-8 flex items-center space-x-2">
            <span class="text-xl font-semibold text-gray-800 dark:text-gray-100">HabitTracker</span>
            </div>

            <!-- Center: Nav Links -->
            <div class="bg-magnolia dark:bg-[#222] rounded-3xl flex items-center px-5 py-3">
                <ul class="hidden md:flex space-x-7 text-cadetGray dark:text-gray-400 font-normal items-center">
                <li>
                    <a href="/dashboard" class="hover:text-amethyst dark:hover:text-violet-400 transition-colors duration-200">Dashboard</a>
                </li>
                <li><a href="/dashboard/my-habits" class="hover:text-amethyst dark:hover:text-violet-400 transition-colors duration-200">My Habits</a></li>
                <li><a href="/dashboard/progress" class="hover:text-amethyst dark:hover:text-violet-400 transition-colors duration-200">Progress</a></li>
                </ul>
            </div>

            <!-- Right: Profile + Actions -->
            <div class="absolute right-8 flex items-center space-x-4">
                <!-- кнопка профілю -->
                <button id="profileButton" class="flex items-center space-x-2 focus:outline-none cursor-pointer">
                    <img th:src="${user.profileImage != null ? user.profileImage : '/images/default-profile.jpg'}"
                         class="w-14 h-14 rounded-full border border-gray-300 dark:border-gray-600 object-cover"  alt="User Photo"/>
                </button>

                <!-- випадаюче меню -->
                <div id="profileMenu"
                    class="hidden absolute right-2 top-12 w-44 bg-white dark:bg-[#1f1f1f] border border-gray-200 dark:border-gray-700 rounded-xl shadow-lg dark:shadow-black/40 z-20 transition ease-out duration-200">
                    <a href="/profile"
                       class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-200
                          hover:bg-violet-50 dark:hover:bg-[#333] hover:text-amethyst dark:hover:text-violet-300">
                        Profile
                    </a>

                    <a href="/settings"
                       class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-200
                          hover:bg-violet-50 dark:hover:bg-[#333] hover:text-amethyst dark:hover:text-violet-300">
                        Settings
                    </a>

                    <a href="#" class="logOutBtn block px-4 py-2 text-sm text-gray-700 dark:text-gray-200
                                  hover:bg-violet-50 dark:hover:bg-[#333] hover:text-red-600">
                        Log out
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <main class="w-[800px]  dark:border-gray-700  mx-auto my-24 py-8 0">
        <section class="bg-white dark:bg-[#1e1e2e] dark:border-gray-700 rounded-3xl px-5 py-6 border border-gray-200 flex items-center space-x-5 shadow-md">

            <!-- Profile Photo (click = upload) -->
            <div class="flex items-center">
                <img id="profilePhoto"
                     th:src="${user.profileImage != null ? user.profileImage : '/images/default-profile.jpg'}"
                     class="w-[90px] h-[90px] rounded-full object-cover object-center cursor-pointer hover:opacity-80 transition"
                     title="Click to change profile photo" />
            </div>

            <!-- Hidden upload form -->
            <form id="uploadForm"
                  action="/profile/upload-photo"
                  method="post"
                  enctype="multipart/form-data"
                  class="absolute opacity-0 w-0 h-0 overflow-hidden -z-10">
                <input id="imageInput"
                       type="file"
                       name="image"
                       accept="image/*"
                       class="absolute opacity-0 w-0 h-0 -z-10">
            </form>

            <!-- User Info -->
            <div class="flex flex-col justify-center space-y-2">
                <span class="text-xl px-1 dark:text-white" th:text="${userFirstName} + ' ' + ${userLastName}"></span>
                <span class="text-gray-400 dark:text-gray-200 text-sm italic">"Small steps, every day"</span>
            </div>

        </section>

        <section class="bg-white dark:bg-[#1e1e2e] dark:border-gray-700 rounded-3xl mt-6 border border-gray-200 flex flex-col shadow-md">
            <!--Account Information-->
            <div class="mt-4">
                <span class="font-medium px-4">Account Information</span>
            </div>
            <div class="bg-magnolia  dark:bg-[#77779F] px-5 py-5 mx-5 rounded-3xl mt-6 mb-7 flex flex-col space-y-3">
                <!--Full name-->
                <div class="bg-white rounded-full border border-gray-200 text-cadetGray font-normal flex space-x-2 px-3 py-3">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                    </svg>
                    <span th:text="${userFirstName} + ' ' + ${userLastName}"></span>
                </div>
                <!--email-->
                <div class="bg-white rounded-full border border-gray-200 text-cadetGray font-normal flex space-x-2 px-3 py-3">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
                    </svg>
                    <span th:text="${userEmail}"></span>
                </div>

            </div>
            <!--Buttons-->
            <div class="flex justify-between mx-5 py-5">
                <button class="changePasswordBtn bg-violet-400 text-white rounded-full px-3 py-2 cursor-pointer hover:bg-violet-600">
                    Change Password
                </button>
                <button class="logOutBtn bg-red-500 text-white rounded-full px-3 py-2 cursor-pointer hover:bg-red-700">
                    Log out
                </button>
            </div>
        </section>
    </main>

    <!-- Change Password Modal -->
    <div id="changePasswordModal"
         class="hidden fixed inset-0 bg-black/30 dark:bg-black/60
            items-center justify-center z-50">

        <div class="bg-white dark:bg-[#1e1e1e]
                rounded-3xl w-[500px] p-6
                shadow-2xl dark:shadow-black/40 relative">

            <!-- Close button -->
            <button id="closeChangePasswordModal"
                    class="absolute top-4 right-4
                       text-gray-400 dark:text-gray-300
                       hover:text-gray-600 dark:hover:text-gray-100">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none"
                     viewBox="0 0 24 24" stroke-width="1.5"
                     stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M6 18 18 6M6 6l12 12" />
                </svg>
            </button>

            <!-- Title -->
            <h2 class="text-lg font-semibold
                   text-gray-700 dark:text-gray-200 mb-4">
                Change Password
            </h2>

            <!-- Form -->
            <form id="changePasswordForm"
                  class="space-y-4 mb-5"
                  action="/profile/change-password"
                  method="post">

                <!-- Current password -->
                <div class="relative">
                <span class="absolute inset-y-0 left-0
                             flex items-center pl-3
                             text-gray-400 dark:text-gray-300">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none"
                         viewBox="0 0 24 24"
                         stroke-width="1.5" stroke="currentColor"
                         class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M16.5 10.5V7.5a4.5 4.5 0 0 0-9 0v3m-1.5 0A1.5 1.5 0 0 0 4.5 12v7.5A1.5 1.5 0 0 0 6 21h12a1.5 1.5 0 0 0 1.5-1.5V12a1.5 1.5 0 0 0-1.5-1.5h-12Z" />
                    </svg>
                </span>

                    <input
                            type="password"
                            name="currentPassword"
                            placeholder="Current password"
                            class="w-full rounded-full border
                           border-gray-300 dark:border-gray-600
                           py-3 pl-10 pr-4
                           text-gray-700 dark:text-gray-100
                           bg-white dark:bg-[#2a2a2a]
                           focus:outline-none focus:ring-2
                           focus:ring-violet-400 dark:focus:ring-violet-500"
                    />
                </div>

                <!-- New password -->
                <div class="relative">
                <span class="absolute inset-y-0 left-0
                             flex items-center pl-3
                             text-gray-400 dark:text-gray-300">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none"
                         viewBox="0 0 24 24"
                         stroke-width="1.5" stroke="currentColor"
                         class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M16.5 10.5V7.5a4.5 4.5 0 0 0-9 0v3m-1.5 0A1.5 1.5 0 0 0 4.5 12v7.5A1.5 1.5 0 0 0 6 21h12a1.5 1.5 0 0 0 1.5-1.5V12a1.5 1.5 0 0 0-1.5-1.5h-12Z" />
                    </svg>
                </span>

                    <input
                            id="newPassword"
                            name="newPassword"
                            type="password"
                            placeholder="New password"
                            class="w-full rounded-full border
                           border-gray-300 dark:border-gray-600
                           py-3 pl-10 pr-4
                           text-gray-700 dark:text-gray-100
                           bg-white dark:bg-[#2a2a2a]
                           focus:outline-none focus:ring-2
                           focus:ring-violet-400 dark:focus:ring-violet-500"
                    />
                </div>

                <!-- Confirm password -->
                <div class="relative">
                <span class="absolute inset-y-0 left-0
                             flex items-center pl-3
                             text-gray-400 dark:text-gray-300">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none"
                         viewBox="0 0 24 24"
                         stroke-width="1.5" stroke="currentColor"
                         class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M16.5 10.5V7.5a4.5 4.5 0 0 0-9 0v3m-1.5 0A1.5 1.5 0 0 0 4.5 12v7.5A1.5 1.5 0 0 0 6 21h12a1.5 1.5 0 0 0 1.5-1.5V12a1.5 1.5 0 0 0-1.5-1.5h-12Z" />
                    </svg>
                </span>

                    <input
                            id="newPasswordConfirm"
                            name="confirmPassword"
                            type="password"
                            placeholder="Confirm new password"
                            class="w-full rounded-full border
                           border-gray-300 dark:border-gray-600
                           py-3 pl-10 pr-4
                           text-gray-700 dark:text-gray-100
                           bg-white dark:bg-[#2a2a2a]
                           focus:outline-none focus:ring-2
                           focus:ring-violet-400 dark:focus:ring-violet-500"
                    />
                </div>

                <!-- Hint -->
                <span class="text-cadetGray dark:text-gray-400
                         font-normal text-md">
                Use at least 8 characters with letters and numbers.
            </span>

                <!-- Buttons -->
                <div class="flex justify-end space-x-3 pt-3 mt-4">
                    <button type="button" id="cancelChangePasswordModal"
                            class="px-4 py-2 rounded-full
                               bg-gray-100 dark:bg-gray-700
                               hover:bg-gray-200 dark:hover:bg-gray-600
                               text-gray-700 dark:text-gray-200">
                        Cancel
                    </button>

                    <button type="submit"
                            class="px-4 py-2 rounded-full
                               bg-violet-500 hover:bg-violet-600
                               text-white">
                        Save changes
                    </button>
                </div>
            </form>

            <p id="passwordErrorText"
               class="text-red-500 dark:text-red-400 text-sm mt-2 hidden"></p>

            <p id="passwordSuccessText"
               class="text-green-600 dark:text-green-400 text-sm mt-2 hidden"></p>

        </div>
    </div>

    <!-- Logout Modal -->
    <div id="logOutModal"
         class="hidden fixed inset-0 bg-black/30 dark:bg-black/60 items-center justify-center z-50">

        <div class="bg-white dark:bg-[#1c1c1c] rounded-3xl w-[500px] p-6 shadow-2xl dark:shadow-black/40 relative">

            <button id="closeLogOutModal"
                    class="absolute top-4 right-4 text-gray-400 dark:text-gray-300 hover:text-gray-600">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none"
                     viewBox="0 0 24 24" stroke-width="1.5"
                     stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M6 18 18 6M6 6l12 12"/>
                </svg>
            </button>

            <div class="flex justify-center items-center mb-3">
                <div class="bg-magnolia dark:bg-[#2d2d2d] rounded-full p-3">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none"
                         viewBox="0 0 24 24"
                         stroke-width="1.5" stroke="currentColor"
                         class="w-6 h-6 text-violet-500">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6A2.25 2.25 0 0 0 5.25 5.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"/>
                    </svg>
                </div>
            </div>

            <div class="flex justify-center items-center">
                <span class="text-lg font-semibold text-gray-900 dark:text-gray-200">Log Out</span>
            </div>

            <div class="flex justify-center items-center mt-1">
                <span class="text-sm text-cadetGray dark:text-gray-400">
                    Are you sure you want to log out of your account?
                </span>
            </div>

            <div class="flex justify-end space-x-3 pt-3 mt-4">
                <button type="button" id="cancelLogOutModal"
                        class="px-4 py-2 bg-gray-100 dark:bg-gray-700
                               hover:bg-gray-200 dark:hover:bg-gray-600 rounded-full">
                    Cancel
                </button>
                <button type="submit" id="logOutConfirmBtn"
                        class="px-4 py-2 bg-red-500 text-white rounded-full hover:bg-red-700">
                    Log out
                </button>
            </div>

        </div>
    </div>

    <script src="/js/theme.js"></script>
    <script src="/js/profile.js"></script>

</body>
</html>
